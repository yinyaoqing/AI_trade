name: AI Trade Bot

on:
  schedule:
    # 每週一至五 00:50 UTC = 台灣時間 08:50，開盤前啟動
    - cron: '50 0 * * 1-5'
  workflow_dispatch:
    inputs:
      reason:
        description: '手動觸發原因'
        required: false
        default: '手動測試'

jobs:
  trading-bot:
    name: 執行模擬交易機器人
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 5 小時上限，涵蓋完整交易時段（09:05-13:25 CST）

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 驗證 Secrets 格式
        env:
          API_KEY:    ${{ secrets.API_KEY || '' }}
          SECRET_KEY: ${{ secrets.SECRET_KEY || '' }}
        run: |
          python - <<'EOF'
          import os, sys, base64, re

          def mask(s: str) -> str:
              """顯示前4後4字元，中間以*遮蔽"""
              if len(s) <= 8:
                  return "***"
              return s[:4] + "*" * (len(s) - 8) + s[-4:]

          def diagnose_secret_key(key: str) -> list[str]:
              issues = []
              raw_bytes = key.encode("utf-8")

              # 1. 長度資訊
              print(f"  字元數     : {len(key)}")
              print(f"  UTF-8 bytes: {len(raw_bytes)}")
              print(f"  內容(遮蔽) : {mask(key)}")

              # 2. 非 ASCII 字元
              non_ascii = [(i, hex(ord(c))) for i, c in enumerate(key) if ord(c) > 127]
              if non_ascii:
                  issues.append(f"含非ASCII字元：{non_ascii}")
              else:
                  print("  ASCII 檢查 : OK（無非ASCII字元）")

              # 3. 不可見字元（空白以外）
              invisible = [(i, repr(c)) for i, c in enumerate(key) if c not in (' ', '\t') and not c.isprintable()]
              if invisible:
                  issues.append(f"含不可見字元：{invisible}")
              else:
                  print("  可見字元   : OK")

              # 4. base64 資訊（僅供診斷，不阻止執行，Shioaji 內部處理格式不同）
              try:
                  decoded = base64.b64decode(key + "==")
                  print(f"  base64解碼長度 : {len(decoded)} bytes（僅供參考，不影響登入）")
              except Exception as ex:
                  issues.append(f"SECRET_KEY 不是有效的 base64 字串: {ex}")

              return issues

          errors = []
          api_key    = os.environ.get("API_KEY", "")
          secret_key = os.environ.get("SECRET_KEY", "")

          print("=" * 50)
          print("[Secrets 驗證] API_KEY")
          print(f"  字元數  : {len(api_key.strip())}")
          if not api_key.strip():
              errors.append("API_KEY 未設定")
          else:
              print(f"  內容    : {mask(api_key.strip())}")

          print("[Secrets 驗證] SECRET_KEY 詳細診斷")
          if not secret_key.strip():
              errors.append("SECRET_KEY 未設定")
          else:
              issues = diagnose_secret_key(secret_key.strip())
              errors.extend(issues)

          print("=" * 50)
          if errors:
              for e in errors:
                  print(f"[Secrets 驗證] 錯誤: {e}")
              print()
              print("解決方法：")
              print("  1. 前往永豐金 API 管理頁面重新複製 SECRET_KEY")
              print("     https://order.sinotrade.com.tw/newweb/api_token_manage/index")
              print("  2. 確認複製的是單行、無空格的完整字串")
              print("  3. 更新 GitHub Secret：")
              print("     https://github.com/你的帳號/AI_trade/settings/secrets/actions")
              sys.exit(1)

          print("[Secrets 驗證] 所有 Secrets 格式正確，繼續執行。")
          EOF

      - name: 還原 CA 憑證（.pfx）
        run: |
          echo "${{ secrets.CA_CERT_B64 }}" | base64 -d > /tmp/sinopac.pfx
          echo "CA_CERT_PATH=/tmp/sinopac.pfx" >> $GITHUB_ENV

      - name: 執行交易機器人
        env:
          API_KEY:              ${{ secrets.API_KEY }}
          SECRET_KEY:           ${{ secrets.SECRET_KEY }}
          CA_PASSWORD:          ${{ secrets.CA_PASSWORD }}
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          # HTTPS_PROXY: 選填，若需要 Proxy 才能連 Telegram，請在 Secrets 加入後取消此行註解
          # HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
        run: python bot.py

      - name: 清除憑證
        if: always()
        run: rm -f /tmp/sinopac.pfx
